<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sports Streaming</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1200px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:32px;
    margin-bottom:8px;
}

.header p{
    color:#94a3b8;
}

.controls{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.btn{
    border:none;
    padding:14px 28px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

.hindi{
    background:#ff6b00;
    color:white;
}

.hindi:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(255,107,0,.4);
}

.english{
    background:#2563eb;
    color:white;
}

.english:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(37,99,235,.4);
}

.player-box{
    background:#111827;
    border-radius:16px;
    overflow:hidden;
    border:1px solid #1e293b;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

iframe{
    width:100%;
    height:70vh;
    border:none;
    background:black;
}

.status{
    text-align:center;
    padding:12px;
    color:#cbd5e1;
    background:#1e293b;
}

@media(max-width:768px){
    iframe{
        height:60vh;
    }

    .header h1{
        font-size:24px;
    }

    .btn{
        width:100%;
        max-width:250px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📺 Live Sports Streaming</h1>
        <p>Select your preferred commentary language</p>
    </div>

    <div class="controls">
        <button class="btn hindi"
            onclick="loadStream('https://allrounderlive.in/zee','Hindi Stream')">
            हिन्दी
        </button>

        <button class="btn english"
            onclick="loadStream('https://allrounderlive.in/tsn','English Stream')">
            English
        </button>
    </div>

    <div class="player-box">
        <iframe id="player"
            src="https://allrounderlive.in/zee"
            allowfullscreen>
        </iframe>

        <div class="status" id="status">
            Now Playing: Hindi Stream
        </div>
    </div>

</div>

<script>
function loadStream(url, name){
    document.getElementById('player').src = url;
    document.getElementById('status').innerText =
        'Now Playing: ' + name;
}
</script>

</body>
</html>
