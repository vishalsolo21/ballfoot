<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports Live | RAIGANJLOOTERS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#0d1117;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
}

.title{
    text-align:center;
    margin-bottom:15px;
}

.title h1{
    font-size:28px;
    margin-bottom:5px;
}

.title p{
    color:#9ca3af;
}

.player-box{
    background:#161b22;
    border-radius:15px;
    overflow:hidden;
    border:1px solid #30363d;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

iframe{
    width:100%;
    height:400px;
    border:none;
    background:#000;
}

.controls{
    display:flex;
    gap:12px;
    justify-content:center;
    padding:15px;
    background:#0f141b;
}

button{
    border:none;
    padding:12px 28px;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px);
}

.hindi{
    background:#ff6a00;
    color:#fff;
}

.english{
    background:#0066ff;
    color:#fff;
}

.status{
    text-align:center;
    padding:12px;
    color:#c9d1d9;
    background:#161b22;
    border-top:1px solid #30363d;
}

@media(max-width:768px){

    iframe{
        height:200px;
    }

    .controls{
        flex-direction:column;
    }

    button{
        width:100%;
    }
}
.footer{
    text-align:center;
    margin-top:20px;
    padding:18px 10px;
    color:#b0b0b0;
    font-size:14px;
    border-top:1px solid #30363d;
    background:#0f141b;
}

.footer .brand{
    color:#00ff66;
    font-weight:700;
}
    
</style>
</head>
<body>

<div class="container">

    <div class="title">
        <h1>📺 Live Sports TV</h1>
        <p>Select Commentary Language</p>
    </div>

    <div class="player-box">

        <iframe
            id="player"
            src="https://allrounderlive.in/zee"
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            allowfullscreen
            referrerpolicy="no-referrer">
        </iframe>

        <div class="controls">
            <button class="hindi" onclick="loadHindi()">
                HINDI
            </button>

            <button class="english" onclick="loadEnglish()">
                ENGLISH
            </button>
        </div>

        <div class="status" id="status">
            Now Playing: Hindi Stream
        </div>

    </div>
<footer class="footer">
    Made with ❤️ by Vishal |
    <span class="brand">RAIGANJLOOTERS</span>
</footer>
    
</div>

<script>
const player = document.getElementById("player");
const statusText = document.getElementById("status");

function loadHindi(){
    player.src = "";
    setTimeout(() => {
        player.src = "https://allrounderlive.in/zee";
        statusText.innerText = "Now Playing: Hindi Stream";
    }, 100);
}

function loadEnglish(){
    player.src = "";
    setTimeout(() => {
        player.src = "https://allrounderlive.in/tsn";
        statusText.innerText = "Now Playing: English Stream";
    }, 100);
}
</script>

</body>
</html>
