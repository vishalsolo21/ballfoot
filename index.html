<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Live Streaming</title>

<style>
body{
    margin:0;
    background:#0f1117;
    color:#fff;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:900px;
    text-align:center;
}

.player{
    width:100%;
    max-width:800px;
    margin:auto;
    background:#000;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.player iframe{
    width:100%;
    height:450px;
    border:none;
}

.buttons{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:12px;
}

button{
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.hindi{
    background:#ff6a00;
    color:#fff;
}

.english{
    background:#0066ff;
    color:#fff;
}

button:hover{
    transform:translateY(-2px);
}

.status{
    margin-top:10px;
    color:#aaa;
}
</style>
</head>
<body>

<div class="container">

    <div class="player">
        <iframe id="stream"
                src="https://allrounderlive.in/zee"
                allowfullscreen>
        </iframe>
    </div>

    <div class="buttons">
        <button class="hindi" onclick="changeStream('https://allrounderlive.in/zee','Hindi')">
            हिन्दी
        </button>

        <button class="english" onclick="changeStream('https://allrounderlive.in/tsn','English')">
            English
        </button>
    </div>

    <div class="status" id="status">
        Current Stream: Hindi
    </div>

</div>

<script>
function changeStream(url,name){
    document.getElementById("stream").src = url;
    document.getElementById("status").innerText =
        "Current Stream: " + name;
}
</script>

</body>
</html>
